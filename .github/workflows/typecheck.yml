name: TypeScript Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/kindrobots

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Secure Achievement definition payloads
        if: github.event_name == 'pull_request' && github.head_ref == 'security/achievement-definition-contract'
        run: node scripts/secure-achievement-definitions.mjs

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run test > /tmp/typecheck.log 2>&1

      - name: Commit verified Achievement definition update
        if: github.event_name == 'pull_request' && github.head_ref == 'security/achievement-definition-contract'
        shell: bash
        run: |
          set -euo pipefail
          rm -f public/wonderlab-components.json
          git config user.name "kind-robots-security"
          git config user.email "kind-robots-security@users.noreply.github.com"
          git add stores/achievementStore.ts docs/notes/backend-sweep-2026-07-05.md docs/architecture/thin-resource-api-audit.md
          git diff --cached --quiet && exit 1
          git commit -m "security: sanitize Achievement definition updates [skip ci]"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          retention-days: 3
          if-no-files-found: warn
          path: /tmp/typecheck.log
