name: Apply API follow-up TypeScript fixes

on:
  push:
    branches: [agent/api-followups-ts-fix]
    paths:
      - ".github/workflows/apply-api-followups-ts-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/api-followups
          fetch-depth: 0
      - name: Apply compiler-driven fixes
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text()
              if text.count(old) != 1:
                  raise RuntimeError(f"Expected one match in {path}: {old[:100]!r}")
              target.write_text(text.replace(old, new, 1))

          replace_once(
              "stores/achievementStore.ts",
              "      if (!shouldRun()) return\n\n      let achievement =",
              "      if (!shouldRun() || !userId) return\n\n      let achievement =",
          )

          butterfly = Path("stores/helpers/butterflyHelper.ts")
          butterfly_text = butterfly.read_text()
          if butterfly_text.count("    userId: null,\n") != 2:
              raise RuntimeError("Expected two nullable butterfly placeholder owners")
          butterfly.write_text(butterfly_text.replace("    userId: null,\n", ""))

          replace_once(
              "stores/scenarioStore.ts",
              "      const data = toScenarioPayload(scenarioForm.value)\n\n      if (data.id && data.id > 0) {\n        return await updateScenario(data.id, data)\n      }",
              "      const scenarioId = Number(scenarioForm.value.id ?? 0)\n      const data = toScenarioPayload(scenarioForm.value)\n\n      if (scenarioId > 0) {\n        return await updateScenario(scenarioId, data)\n      }",
          )

          replace_once(
              "stores/serendipityStore.ts",
              "export type SerendipitySession = {\n  id: string\n  userId: number\n",
              "export type SerendipitySession = {\n  id: string\n  userId: number | null\n",
          )

          replace_once(
              "stores/userStore.ts",
              "  async function updateKarmaAndMana() {\n    if (!user.value || user.value.id === 10) {\n      return { success: false, message: 'Guest users do not update karma.' }\n    }\n\n    try {",
              "  async function updateKarmaAndMana() {\n    if (!user.value || user.value.id === 10) {\n      return { success: false, message: 'Guest users do not update karma.' }\n    }\n\n    const currentUserId = user.value.id\n\n    try {",
          )
          replace_once(
              "stores/userStore.ts",
              "        users.value = updateUserFields(users.value, userId.value, {",
              "        users.value = updateUserFields(users.value, currentUserId, {",
          )
      - name: Verify diff
        run: git diff --check
      - name: Commit and push target branch
        run: |
          git config user.name "kind-robots-api-agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix API follow-up TypeScript contracts"
          git push origin HEAD:agent/api-followups
