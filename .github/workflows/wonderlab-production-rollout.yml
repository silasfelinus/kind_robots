name: WonderLab Production Rollout

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/wonderlab-production-rollout.yml'
      - 'scripts/wonderlab-production-rollout.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/wonderlab-production-rollout.yml'
      - 'scripts/wonderlab-production-rollout.mjs'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply a conflict-free Component reconciliation and clean exact stale Cypress Component fixtures'
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: wonderlab-production-rollout-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate rollout runner
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check rollout script syntax and safety boundary
        run: |
          set -euo pipefail
          node --check scripts/wonderlab-production-rollout.mjs
          node <<'NODE'
          const fs = require('node:fs')
          const assert = require('node:assert').strict
          const source = fs.readFileSync('scripts/wonderlab-production-rollout.mjs', 'utf8')

          const requiredEndpoints = [
            ['/wonderlab-components.json'],
            ['/api', '/components', '/reconcile'],
            ['/api', '/components'],
            ['/api', '/admin', '/wonderlab', '/review-rollout'],
          ].map((parts) => parts.join(''))

          for (const required of [
            ...requiredEndpoints,
            "mode: 'dry-run'",
            "mode: 'apply'",
            'WONDERLAB_ROLLOUT_APPLY',
          ]) {
            assert.ok(source.includes(required), `missing required rollout boundary: ${required}`)
          }

          for (const forbidden of [
            '/generate',
            '/publish',
            '/approve',
            'ReviewDraft',
            'Reaction',
            'DATABASE_URL',
            '_prisma_migrations',
          ]) {
            assert.ok(!source.includes(forbidden), `rollout runner crossed forbidden boundary: ${forbidden}`)
          }

          assert.match(source, /if \(Number\(drySummary\.conflicts \|\| 0\) !== 0\)/)
          assert.match(source, /reviewCount === 0/)
          assert.match(source, /record\.isDiscovered !== true/)
          assert.match(source, /!record\.sourceKey/)
          assert.match(source, /!record\.sourcePath/)
          console.log('WonderLab production rollout safety contract passed.')
          NODE

  reconcile:
    name: Reconcile and audit WonderLab
    # [wonderlab-rollout] performs the guarded apply. [wonderlab-audit] runs the
    # same conflict-checking dry run plus the read-only rollout audit. Ordinary
    # workflow edits remain inert unless explicitly dispatched or tagged.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        contains(github.event.head_commit.message, '[wonderlab-rollout]') ||
        contains(github.event.head_commit.message, '[wonderlab-audit]')
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select rollout mode
        env:
          REQUESTED_APPLY: ${{ inputs.apply }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${REQUESTED_APPLY:-false}" = "true" ]; then
              echo 'WONDERLAB_ROLLOUT_APPLY=1' >> "$GITHUB_ENV"
            else
              echo 'WONDERLAB_ROLLOUT_APPLY=0' >> "$GITHUB_ENV"
            fi
          elif printf '%s' "${COMMIT_MESSAGE:-}" | grep -Fq '[wonderlab-rollout]'; then
            echo 'WONDERLAB_ROLLOUT_APPLY=1' >> "$GITHUB_ENV"
          else
            echo 'WONDERLAB_ROLLOUT_APPLY=0' >> "$GITHUB_ENV"
          fi

      - name: Verify live production prerequisites
        env:
          BASE_URL: https://kind-robots.vercel.app
        run: |
          set -euo pipefail
          mkdir -p wonderlab-rollout-artifacts

          version="$(curl -sf --max-time 20 "${BASE_URL}/api/version")"
          printf '%s' "$version" | jq -e '.success == true and (.data.commit | type == "string")' >/dev/null
          printf '%s\n' "$version" > wonderlab-rollout-artifacts/production-version.json

          manifest="$(curl -sf --max-time 30 "${BASE_URL}/wonderlab-components.json")"
          printf '%s' "$manifest" | jq -e '.count > 0 and (.entries | length) == .count' >/dev/null

          components="$(curl -sf --max-time 30 "${BASE_URL}/api/components")"
          printf '%s' "$components" | jq -e '.success == true and (.data | type == "array")' >/dev/null

          echo "Production prerequisites are ready at commit $(printf '%s' "$version" | jq -r '.data.commit')."
          echo "Live manifest contains $(printf '%s' "$manifest" | jq -r '.count') Components."

      - name: Reconcile canonical Component registry and run rollout audit
        env:
          WONDERLAB_BASE_URL: https://kind-robots.vercel.app
          WONDERLAB_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          WONDERLAB_CLEANUP_FIXTURES: '1'
          WONDERLAB_ROLLOUT_OUTPUT: wonderlab-rollout-artifacts
        run: |
          set -euo pipefail
          if [ -z "${WONDERLAB_ADMIN_TOKEN:-}" ]; then
            echo '::error::CYPRESS_BETA_ADMIN_TOKEN is not configured.'
            exit 1
          fi
          node scripts/wonderlab-production-rollout.mjs

      - name: Upload rollout evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wonderlab-production-rollout-${{ github.run_id }}
          path: wonderlab-rollout-artifacts
          if-no-files-found: warn
          retention-days: 30

      - name: Post durable rollout report
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          OUTPUT_DIR: wonderlab-rollout-artifacts
        with:
          script: |
            const fs = require('node:fs')
            const path = require('node:path')

            const readJson = (name) => {
              const target = path.join(process.env.OUTPUT_DIR, name)
              if (!fs.existsSync(target)) return null
              try {
                return JSON.parse(fs.readFileSync(target, 'utf8'))
              } catch (error) {
                return { parseError: error.message }
              }
            }

            const productionVersion = readJson('production-version.json')
            const summary = readJson('rollout-summary.json')
            const dryRun = readJson('reconcile-dry-run.json')
            const apply = readJson('reconcile-apply.json')
            const cleanup = readJson('fixture-cleanup.json')
            const verification = readJson('canonical-verification.json')
            const audit = readJson('review-rollout-audit.json')
            const drySummary = dryRun?.data?.summary || summary?.reconciliation || null
            const auditData = audit?.data || null
            const mode = process.env.WONDERLAB_ROLLOUT_APPLY === '1' ? 'apply' : 'read-only audit'
            const liveCommit = productionVersion?.data?.commit || 'unknown'
            const deploymentId = productionVersion?.data?.deploymentId || 'unknown'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const lines = [
              `## WonderLab production ${mode} report`,
              '',
              `- **Workflow:** [run ${context.runId}](${runUrl})`,
              `- **Result:** ${process.env.JOB_STATUS}`,
              `- **Production commit:** \`${liveCommit}\``,
              `- **Deployment:** \`${deploymentId}\``,
              `- **Production base:** ${summary?.baseUrl || 'https://kind-robots.vercel.app'}`,
            ]

            if (drySummary) {
              lines.push(
                `- **Reconciliation dry run:** ${drySummary.creates || 0} creates, ${drySummary.updates || 0} updates, ${drySummary.unchanged || 0} unchanged, ${drySummary.missingFromManifest || 0} database-only, ${drySummary.conflicts || 0} conflicts`,
              )
            }
            if (apply?.data?.applied === true) {
              lines.push('- **Canonical reconciliation:** applied atomically')
            }
            if (cleanup) {
              const deleted = (cleanup.results || []).filter((entry) => entry.ok).length
              const failed = (cleanup.results || []).filter((entry) => !entry.ok).length
              lines.push(`- **Exact Cypress fixture cleanup:** ${deleted} removed, ${failed} failed`)
            }
            if (verification) {
              lines.push(
                `- **Canonical verification:** ${verification.canonicalRecordCount || 0}/${verification.manifestCount || 0} source identities; ${verification.missingCount || 0} missing; ${verification.mismatchCount || 0} mismatched; ${verification.duplicateSourceKeyCount || 0} duplicate source keys`,
              )
            }
            if (auditData) {
              const blocked = (auditData.checks || [])
                .filter((entry) => !entry.ok)
                .map((entry) => entry.key)
              lines.push(
                `- **Personality rollout audit:** ${auditData.ready ? 'Ready' : `Blocked (${blocked.join(', ') || 'see artifact'})`}`,
              )
            }
            if (!summary) {
              lines.push('- **Evidence:** workflow stopped before the final summary; inspect the uploaded partial JSON artifacts and runtime logs.')
            }
            lines.push('', '_Automated evidence report; no review generation, approval, or publication occurs in this workflow._')

            const body = lines.join('\n')
            for (const issue_number of [381, 472]) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              })
            }

            const blockedChecks = (auditData?.checks || [])
              .filter((entry) => !entry.ok)
              .map((entry) => entry.key)
            const handoff = [
              '# WonderLab production rollout evidence and resume handoff',
              '',
              '## Latest automated status',
              '',
              body,
              '',
              '## Resume checklist',
              '',
              `1. Verify \`/api/version\` still reports \`${liveCommit}\` or a newer descendant.`,
              '2. Read #381, #472, and #473 before changing rollout behavior.',
              process.env.WONDERLAB_ROLLOUT_APPLY === '1'
                ? '3. If this apply succeeded, proceed to representative Dotti/Catbot draft generation, curator approval, publication, and desktop/mobile acceptance.'
                : '3. Do not run an apply until production contains PR #527 (`5fa25cdb67f0d3dacad3b6eceb2e4bdd1de2088d`) or a descendant.',
              '4. Use `[wonderlab-audit]` for a read-only refresh; use `[wonderlab-rollout]` only for the conflict-gated write rollout.',
              '5. Neither trigger generates, approves, or publishes personality reviews.',
              '',
              '## Current machine checks',
              '',
              `- Audit ready: ${auditData?.ready === true ? 'yes' : 'no'}`,
              `- Blocked audit checks: ${blockedChecks.join(', ') || 'none reported'}`,
              `- Reconciliation conflicts: ${drySummary?.conflicts ?? 'unknown'}`,
              `- Database-only Component rows: ${drySummary?.missingFromManifest ?? 'unknown'}`,
              `- Canonical verification available: ${verification ? 'yes' : 'no'}`,
              '',
              `Last updated by [Actions run ${context.runId}](${runUrl}).`,
            ].join('\n')

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 531,
              body: handoff,
            })
