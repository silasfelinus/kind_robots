name: WonderLab responsive collection adoption

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/wonderlab-responsive-collection.yml
      - .github/scripts/apply-wonderlab-responsive-collection.py
      - .github/scripts/fix-wonderlab-responsive-helper.py

permissions:
  contents: write

jobs:
  patch-collection:
    name: Patch responsive WonderLab collection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout responsive collection branch
        uses: actions/checkout@v4
        with:
          ref: feat/wonderlab-responsive-collection
          fetch-depth: 0

      - name: Normalize temporary helper literals
        run: python .github/scripts/fix-wonderlab-responsive-helper.py

      - name: Patch responsive collection
        run: python .github/scripts/apply-wonderlab-responsive-collection.py

      - name: Validate museum diff
        run: git diff --check -- components/wonderlab/lab-interact.vue

      - name: Commit responsive collection
        run: |
          git config user.name "kind-robots-wonderlab-collection"
          git config user.email "kind-robots-wonderlab-collection@users.noreply.github.com"
          git add components/wonderlab/lab-interact.vue
          if git diff --cached --quiet; then
            echo "WonderLab responsive collection is already current."
            exit 0
          fi
          git commit -m "feat: add responsive WonderLab collection [collection-adopt]"
          git push origin HEAD:feat/wonderlab-responsive-collection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
