name: Component Prisma schema adoption

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/component-schema-adopt.yml
      - .github/scripts/apply-component-schema-adoption.py

permissions:
  contents: write

jobs:
  adopt-schema:
    name: Patch and generate Prisma schema
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout adoption branch
        uses: actions/checkout@v4
        with:
          ref: feat/component-prisma-runtime-adoption
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Patch Component schema
        run: python .github/scripts/apply-component-schema-adoption.py

      - name: Install dependencies
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Format Prisma schema
        run: npx prisma format

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate generated diff
        run: git diff --check

      - name: Commit generated schema and client
        run: |
          git config user.name "kind-robots-schema-adoption"
          git config user.email "kind-robots-schema-adoption@users.noreply.github.com"
          git add prisma/schema.prisma prisma/generated/prisma
          if git diff --cached --quiet; then
            echo "Schema and generated client are already current."
            exit 0
          fi
          git commit -m "chore: adopt canonical Component schema [schema-adopt]"
          git push origin HEAD:feat/component-prisma-runtime-adoption
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
