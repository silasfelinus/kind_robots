name: One-shot Project Facet type fixes

on:
  pull_request:
    paths:
      - .github/workflows/one-shot-project-facet-type-fixes.yml

permissions:
  contents: write

jobs:
  patch-type-errors:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/project-facet-additive-schema

      - name: Apply targeted compatibility fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path_name: str, old: str, new: str, count: int = 1) -> None:
              path = Path(path_name)
              text = path.read_text()
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f'{path_name}: expected {count} matches, found {actual}: {old!r}')
              path.write_text(text.replace(old, new, count))

          for path_name in [
              'components/butterfly/ami-butterfly.vue',
              'components/butterfly/store-butterfly.vue',
              'stores/helpers/butterflyHelper.ts',
          ]:
              replace(
                  path_name,
                  "import { makeNoise2D } from 'open-simplex-noise'",
                  "import { makeNoise2D } from '~/utils/makeNoise2D'",
              )

          replace(
              'server/api/sheets/[id].delete.ts',
              'include: { Dream: true },',
              'include: { Dream: true, Project: true },',
          )
          replace(
              'server/api/sheets/[id].delete.ts',
              'existing.userId === user.id || existing.Dream.userId === user.id',
              'existing.userId === user.id ||\n      existing.Dream?.userId === user.id ||\n      existing.Project?.userId === user.id',
          )

          replace(
              'server/api/sheets/[id].get.ts',
              '        Dream: true,',
              '        Dream: true,\n        Project: true,',
          )
          replace(
              'server/api/sheets/[id].get.ts',
              'user && (data.userId === user.id || data.Dream.userId === user.id)',
              'user &&\n        (data.userId === user.id ||\n          data.Dream?.userId === user.id ||\n          data.Project?.userId === user.id)',
          )
          replace(
              'server/api/sheets/[id].get.ts',
              'const canView = data.isPublic && data.Dream.isPublic',
              'const canView =\n      data.isPublic &&\n      (data.Dream?.isPublic ?? data.Project?.isPublic ?? false)',
          )

          replace(
              'server/api/sheets/index.post.ts',
              '        Dream: true,',
              '        Dream: true,\n        Project: true,',
          )
          replace(
              'server/api/sheets/index.post.ts',
              'const isOwner = data.userId === user?.id || data.Dream.userId === user?.id',
              'const isOwner =\n      data.userId === user?.id ||\n      data.Dream?.userId === user?.id ||\n      data.Project?.userId === user?.id',
          )
          replace(
              'server/api/sheets/index.post.ts',
              'const canView = data.isPublic && data.Dream.isPublic',
              'const canView =\n      data.isPublic &&\n      (data.Dream?.isPublic ?? data.Project?.isPublic ?? false)',
          )

          replace(
              'server/api/sheets/[id].patch.ts',
              'include: { Dream: true },',
              'include: { Dream: true, Project: true },',
          )
          replace(
              'server/api/sheets/[id].patch.ts',
              'existing.userId === user.id || existing.Dream.userId === user.id',
              'existing.userId === user.id ||\n      existing.Dream?.userId === user.id ||\n      existing.Project?.userId === user.id',
          )
          replace(
              'server/api/sheets/[id].patch.ts',
              '        Dream: true,',
              '        Dream: true,\n        Project: true,',
          )

          replace(
              'server/api/sheets/by-dream/[dreamId].get.ts',
              '        Dream: true,',
              '        Dream: true,\n        Project: true,',
          )
          replace(
              'server/api/sheets/by-dream/[dreamId].get.ts',
              'const isOwner = data.userId === user?.id || data.Dream.userId === user?.id',
              'const isOwner =\n      data.userId === user?.id ||\n      data.Dream?.userId === user?.id ||\n      data.Project?.userId === user?.id',
          )
          replace(
              'server/api/sheets/by-dream/[dreamId].get.ts',
              'const canView = data.isPublic && data.Dream.isPublic',
              'const canView =\n      data.isPublic &&\n      (data.Dream?.isPublic ?? data.Project?.isPublic ?? false)',
          )

          replace(
              'stores/helpers/chatHelper.ts',
              '  dreamId?: number | null\n}',
              '  dreamId?: number | null\n  projectId?: number | null\n}',
          )
          replace(
              'stores/helpers/chatHelper.ts',
              '    dreamId: input.dreamId ?? null,\n    isActive: true,',
              '    dreamId: input.dreamId ?? null,\n    projectId: input.projectId ?? null,\n    isActive: true,',
          )

          replace(
              'stores/sheetStore.ts',
              '    for (const sheet of sheets.value) map.set(sheet.dreamId, sheet)',
              '    for (const sheet of sheets.value) {\n      if (sheet.dreamId !== null) map.set(sheet.dreamId, sheet)\n    }',
          )
          PY

      - name: Remove helper and publish fixes
        run: |
          git rm .github/workflows/one-shot-project-facet-type-fixes.yml
          git config user.name 'Kind Robots Migration Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            components/butterfly/ami-butterfly.vue \
            components/butterfly/store-butterfly.vue \
            stores/helpers/butterflyHelper.ts \
            server/api/sheets/[id].delete.ts \
            server/api/sheets/[id].get.ts \
            server/api/sheets/[id].patch.ts \
            server/api/sheets/by-dream/[dreamId].get.ts \
            server/api/sheets/index.post.ts \
            stores/helpers/chatHelper.ts \
            stores/sheetStore.ts
          git commit -m 'Fix Project Facet compatibility types'
          git push origin HEAD:agent/project-facet-additive-schema
