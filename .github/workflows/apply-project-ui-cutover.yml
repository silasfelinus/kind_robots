name: Finish Project UI Cutover

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/kindrobots
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/remove-project-dream-ui-fallbacks
          fetch-depth: 1
          show-progress: false

      - name: Remove remaining Project Dream component bridges
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(source: str, old: str, new: str, expected: int, label: str) -> str:
              count = source.count(old)
              if count != expected:
                  raise RuntimeError(f'{label}: expected {expected}, found {count}')
              return source.replace(old, new)

          parent_path = Path('components/pages/conductor-page.vue')
          parent = parent_path.read_text(encoding='utf-8')
          parent = replace_exact(
              parent,
              '              :dream-id="null"\n',
              '',
              2,
              'remove parent Dream compatibility props',
          )
          if 'linkedDream' in parent or ':dream-id=' in parent:
              raise RuntimeError('parent still contains a Project Dream bridge')
          parent_path.write_text(parent, encoding='utf-8')

          waypoints_path = Path('components/pages/conductor-project-waypoints.vue')
          waypoints = waypoints_path.read_text(encoding='utf-8')
          waypoints = replace_exact(
              waypoints,
              '  dreamId?: number | null\n',
              '',
              1,
              'remove waypoint Dream prop',
          )
          waypoints = replace_exact(
              waypoints,
              '    dreamId: props.dreamId ?? null,\n',
              '',
              1,
              'remove waypoint Dream write',
          )
          if 'dreamId' in waypoints:
              raise RuntimeError('waypoint component still contains dreamId')
          waypoints_path.write_text(waypoints, encoding='utf-8')

          chat_path = Path('components/pages/conductor-project-chat.vue')
          chat = chat_path.read_text(encoding='utf-8')
          chat = replace_exact(
              chat,
              '<!-- Direct AI contact for a single Project. New chats persist through projectId;\n     dreamId remains an optional compatibility link during the schema cutover. -->',
              '<!-- Direct AI contact for a single Project. Chats persist through projectId. -->',
              1,
              'replace Project chat compatibility comment',
          )
          chat = replace_exact(
              chat,
              '  dreamId?: number | null\n',
              '',
              1,
              'remove Project chat Dream prop',
          )
          chat = replace_exact(
              chat,
              "const legacyChannel = computed(() =>\n  props.dreamId ? `dream-${props.dreamId}-assistant` : '',\n)\n",
              '',
              1,
              'remove legacy Project Dream channel',
          )
          chat = replace_exact(
              chat,
              '        (legacyChannel.value && chat.channel === legacyChannel.value) ||\n',
              '',
              1,
              'remove legacy channel filter',
          )
          chat = replace_exact(
              chat,
              '      dreamId: props.dreamId ?? null,\n',
              '',
              1,
              'remove Project chat Dream write',
          )
          if 'dreamId' in chat or 'legacyChannel' in chat:
              raise RuntimeError('Project chat still contains a Dream compatibility bridge')
          chat_path.write_text(chat, encoding='utf-8')
          PY

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Vue and TypeScript
        run: npm run test

      - name: Commit validated component cleanup
        run: |
          git config user.name "kind-robots-agent"
          git config user.email "actions@users.noreply.github.com"
          git add components/pages/conductor-page.vue \
            components/pages/conductor-project-waypoints.vue \
            components/pages/conductor-project-chat.vue
          git commit -m "Remove remaining Project Dream component bridges"
          git push origin HEAD:agent/remove-project-dream-ui-fallbacks
