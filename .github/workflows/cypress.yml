name: Cypress Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      max_wait_seconds:
        description: 'Max seconds to wait for the pushed commit to go live on Vercel before running tests'
        required: false
        default: '600'

concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for deploy to go live
        env:
          BASE_URL: https://kind-robots.vercel.app
          TARGET_SHA: ${{ github.sha }}
          MAX_WAIT: ${{ github.event.inputs.max_wait_seconds || '600' }}
        run: |
          echo "Waiting up to ${MAX_WAIT}s for production to serve ${TARGET_SHA}..."
          deadline=$(( $(date +%s) + MAX_WAIT ))
          live=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            body="$(curl -sf --max-time 15 "${BASE_URL}/api/version" || true)"
            live="$(printf '%s' "$body" | jq -r '.data.commit // empty' 2>/dev/null || true)"
            if [ -n "$live" ] && [ "$live" = "$TARGET_SHA" ]; then
              echo "Production is serving ${live} — deploy is live."
              exit 0
            fi
            echo "  not live yet (serving: ${live:-unknown}); retrying in 10s..."
            sleep 10
          done
          echo "::error::Production did not serve ${TARGET_SHA} within ${MAX_WAIT}s (last seen: ${live:-unknown})."
          exit 1

      - name: Verify database readiness
        env:
          BASE_URL: https://kind-robots.vercel.app
        run: |
          echo "Waiting for three consecutive database health checks..."
          deadline=$(( $(date +%s) + 180 ))
          consecutive=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            body="$(curl -sf --max-time 15 "${BASE_URL}/api/health/database" || true)"
            if printf '%s' "$body" | jq -e '.success == true and .statusCode == 200' >/dev/null 2>&1; then
              consecutive=$(( consecutive + 1 ))
              echo "  database healthy (${consecutive}/3)"
              if [ "$consecutive" -ge 3 ]; then
                exit 0
              fi
            else
              consecutive=0
              echo "  database unavailable; retrying in 5s..."
            fi
            sleep 5
          done
          echo "::error::Database did not remain healthy for three consecutive checks."
          exit 1

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
          record: ${{ secrets.CYPRESS_RECORD_KEY != '' }}
        env:
          CYPRESS_BASE_API_URL: https://kind-robots.vercel.app/api
          CYPRESS_BETA_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          CYPRESS_API_KEY: ${{ secrets.CYPRESS_API_KEY }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_TIMING_LOG: '1'
          CYPRESS_SYNTHETIC_SOURCE: github-actions-cypress
          CYPRESS_SYNTHETIC_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

      - name: Verify Cypress cleanup
        if: always()
        run: node scripts/verify-cypress-cleanup.mjs

      - name: Upload Cypress diagnostic reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-diagnostics
          path: |
            .cypress-cache/timing-latest.json
            .cypress-cache/seed-cleanup-latest.json
            .cypress-cache/orphan-user-sweep-latest.json
          if-no-files-found: warn

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
