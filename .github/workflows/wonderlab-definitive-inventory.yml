name: WonderLab Definitive Commentary Inventory

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/wonderlab-definitive-inventory.yml'
      - 'scripts/wonderlab-definitive-inventory.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/wonderlab-definitive-inventory.yml'
      - 'scripts/wonderlab-definitive-inventory.mjs'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wonderlab-definitive-inventory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node --check scripts/wonderlab-definitive-inventory.mjs

  inventory:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Wait for exact corpus stats route
        env:
          WONDERLAB_BASE_URL: https://kind-robots.vercel.app
          WONDERLAB_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            body="$(
              curl -sS --max-time 20 \
                -H 'accept: application'/'json' \
                -H "x-beta-admin-token: $WONDERLAB_ADMIN_TOKEN" \
                -H "x-admin-token: $WONDERLAB_ADMIN_TOKEN" \
                -H "x-api-key: $WONDERLAB_ADMIN_TOKEN" \
                "$WONDERLAB_BASE_URL/api/admin/wonderlab/review-drafts/stats?status=PUBLISHED" \
                || true
            )"
            highest="$(printf '%s' "$body" | jq -r '.data.highestDraftId // 0' 2>/dev/null || true)"
            published="$(printf '%s' "$body" | jq -r '.data.reviewDrafts // 0' 2>/dev/null || true)"
            if [ "$highest" -gt 0 ] 2>/dev/null && [ "$published" -gt 0 ] 2>/dev/null; then
              echo "Exact corpus stats route is ready: $published published drafts through #$highest."
              exit 0
            fi
            echo "Exact corpus stats route not ready (attempt $attempt of 36); retrying in 10 seconds."
            sleep 10
          done
          echo "::error::Exact corpus stats route did not become ready."
          exit 1
      - name: Capture canonical production corpus
        env:
          WONDERLAB_BASE_URL: https://kind-robots.vercel.app
          WONDERLAB_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          WONDERLAB_DEFINITIVE_OUTPUT: wonderlab-definitive-artifacts
        run: node scripts/wonderlab-definitive-inventory.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: wonderlab-definitive-inventory-${{ github.run_id }}
          path: wonderlab-definitive-artifacts
          retention-days: 30
      - name: Publish canonical snapshot branch
        env:
          SNAPSHOT_BRANCH: wonderlab-definitive-corpus-snapshot
        run: |
          set -euo pipefail
          snapshot_tmp="$(mktemp -d)"
          cp -R wonderlab-definitive-artifacts/. "$snapshot_tmp/"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan "$SNAPSHOT_BRANCH"
          git clean -fdx
          mkdir -p corpus
          cp -R "$snapshot_tmp"/. corpus/
          cat > README.md <<EOF
          # WonderLab definitive commentary corpus snapshot

          Generated from the authenticated production API by workflow run ${GITHUB_RUN_ID}.

          This branch is machine-generated and force-updated. The JSON inventory is the canonical input for guarded editorial rewrite batches.
          EOF
          git add README.md corpus
          git commit -m "WonderLab definitive corpus snapshot (run ${GITHUB_RUN_ID})"
          git push --force origin "HEAD:${SNAPSHOT_BRANCH}"