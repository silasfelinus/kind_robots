name: WonderLab Component Fixture Once

on:
  push:
    branches:
      - fix/wonderlab-remove-legacy-component-status
    paths:
      - '.github/workflows/wonderlab-component-fixture-once.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/wonderlab-component-fixture-once.yml'

permissions:
  contents: write

jobs:
  replace-fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/wonderlab-remove-legacy-component-status
          fetch-depth: 0

      - name: Replace legacy Component fixture status
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('utils/wonderlab/previewFixtures.ts')
          source = path.read_text()
          old = """        componentName: 'component-card',
          isWorking: true,
          underConstruction: false,
          isBroken: false,
          title: 'Museum Component Card',
"""
          new = """        componentName: 'component-card',
          status: 'WORKING',
          title: 'Museum Component Card',
"""
          count = source.count(old)
          if count != 1:
              raise SystemExit(f'Expected one legacy Component fixture block, found {count}.')
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Commit fixture replacement
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add utils/wonderlab/previewFixtures.ts
          git commit -m 'Use canonical status in Component preview fixture'
          git push origin HEAD:fix/wonderlab-remove-legacy-component-status
