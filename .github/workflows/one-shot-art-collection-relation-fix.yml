name: One-shot ArtCollection relation fix

on:
  pull_request:
    paths:
      - .github/workflows/one-shot-art-collection-relation-fix.yml

permissions:
  contents: write

jobs:
  patch-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/project-facet-additive-schema

      - name: Make optional relation consistent
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('prisma/schema.prisma')
          text = path.read_text()
          old = '  User            User                   @relation(fields: [userId], references: [id])'
          new = '  User            User?                  @relation(fields: [userId], references: [id], onDelete: SetNull)'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'Expected exactly one ArtCollection relation match, found {count}')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Remove one-shot workflow and publish fix
        run: |
          git rm .github/workflows/one-shot-art-collection-relation-fix.yml
          git config user.name 'Kind Robots Migration Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add prisma/schema.prisma
          git commit -m 'Fix optional ArtCollection user relation'
          git push origin HEAD:agent/project-facet-additive-schema
