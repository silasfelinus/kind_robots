name: Diagnose PR 357 Capture Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: diagnose-pr357-capture-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.head_ref == 'agent/remove-code-compositions'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CYPRESS_INSTALL_BINARY: '0'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-code-compositions
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture exact guard diagnostics
        shell: bash
        run: |
          git fetch origin main
          set +e
          npm run test:capture-group-guards -- origin/main > capture-group-guard.txt 2>&1
          status=$?
          set -e
          cat capture-group-guard.txt
          echo "$status" > capture-group-guard.status

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pr357-capture-group-guard
          path: |
            capture-group-guard.txt
            capture-group-guard.status
          if-no-files-found: error
          retention-days: 3
