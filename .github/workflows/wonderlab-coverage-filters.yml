name: WonderLab coverage filters

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/wonderlab-coverage-filters.yml
      - .github/scripts/apply-wonderlab-coverage-filters.py

permissions:
  contents: write

jobs:
  patch-coverage-filters:
    name: Patch WonderLab coverage filters
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout coverage-filter branch
        uses: actions/checkout@v4
        with:
          ref: feat/wonderlab-coverage-filters
          fetch-depth: 0

      - name: Patch WonderLab coverage filters
        run: python .github/scripts/apply-wonderlab-coverage-filters.py

      - name: Validate diff
        run: git diff --check -- components/wonderlab/lab-interact.vue

      - name: Commit coverage filters
        run: |
          git config user.name "kind-robots-wonderlab-coverage"
          git config user.email "kind-robots-wonderlab-coverage@users.noreply.github.com"
          git add components/wonderlab/lab-interact.vue
          if git diff --cached --quiet; then
            echo "WonderLab coverage filters are already current."
            exit 0
          fi
          git commit -m "feat: filter WonderLab by reviews and discovery [coverage-filters]"
          git push origin HEAD:feat/wonderlab-coverage-filters
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
