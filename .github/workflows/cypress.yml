name: Cypress Tests

# Runs on a schedule rather than `push`. main's commit velocity (often multiple
# merges per minute during active conductor cycles) is faster than a single
# run can complete (deploy wait + DB readiness + the suite itself commonly
# exceeds 20-30 minutes), so a push-triggered run under cancel-in-progress
# concurrency was preempted by the next push before it could ever finish --
# every run in the history showed conclusion "cancelled", so main effectively
# had no Cypress signal at all. The "wait for deploy" step already tolerates
# testing a commit that has been superseded by a later one on main, so a
# periodic run against whatever is live works the same way a push-triggered
# run did, just decoupled from push cadence.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      max_wait_seconds:
        description: 'Max seconds to wait for the pushed commit to go live on Vercel before running tests'
        required: false
        default: '1200'

concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for deploy to go live
        env:
          BASE_URL: https://kind-robots.vercel.app
          TARGET_SHA: ${{ github.sha }}
          MAX_WAIT: ${{ github.event.inputs.max_wait_seconds || '1200' }}
        run: |
          echo "Waiting up to ${MAX_WAIT}s for production to serve ${TARGET_SHA} (or a commit that supersedes it)..."
          deadline=$(( $(date +%s) + MAX_WAIT ))
          live=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            body="$(curl -sf --max-time 15 "${BASE_URL}/api/version" || true)"
            live="$(printf '%s' "$body" | jq -r '.data.commit // empty' 2>/dev/null || true)"
            if [ -n "$live" ]; then
              if [ "$live" = "$TARGET_SHA" ]; then
                echo "Production is serving ${live} — deploy is live."
                exit 0
              fi
              # A burst of several merges within a short window can land newer
              # commits on main before this run's own deploy goes live, so an
              # already-superseded TARGET_SHA never becomes the exact `live`
              # value. If the live commit already contains TARGET_SHA (i.e.
              # TARGET_SHA is one of its ancestors), this deploy's changes are
              # live too via that superseding commit -- not a failure. Only
              # deepen the (shallow) checkout when ancestry needs checking, so
              # the common exact-match case stays fast.
              if ! git cat-file -e "${live}^{commit}" 2>/dev/null; then
                git fetch --quiet --depth=200 origin main 2>/dev/null || true
              fi
              if bash scripts/check-deploy-ancestry.sh "$TARGET_SHA" "$live" 2>/dev/null; then
                echo "Production is serving ${live}, a newer commit that already includes ${TARGET_SHA} — deploy is live (superseded)."
                exit 0
              fi
            fi
            echo "  not live yet (serving: ${live:-unknown}); retrying in 10s..."
            sleep 10
          done
          echo "::error::Production did not serve ${TARGET_SHA} (or a superseding commit) within ${MAX_WAIT}s (last seen: ${live:-unknown})."
          exit 1

      - name: Verify database readiness
        env:
          BASE_URL: https://kind-robots.vercel.app
        run: |
          set -euo pipefail

          check_database() {
            local endpoint="$1"
            local body
            body="$(curl -sf --max-time 15 "${BASE_URL}${endpoint}")" || return 1
            printf '%s' "$body" | jq -e '.success == true and .statusCode == 200' >/dev/null
          }

          echo "Waiting for three consecutive pooled database health checks..."
          deadline=$(( $(date +%s) + 180 ))
          consecutive=0
          ready=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if check_database /api/health/database; then
              consecutive=$(( consecutive + 1 ))
              echo "  pooled database healthy (${consecutive}/3)"
              if [ "$consecutive" -ge 3 ]; then
                ready=1
                break
              fi
            else
              consecutive=0
              echo "  pooled database unavailable; retrying in 5s..."
            fi
            sleep 5
          done

          if [ "$ready" -ne 1 ]; then
            echo "::error::Database did not remain healthy for three consecutive checks."
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT

          run_pool_round() {
            local round="$1"
            local failed=0
            local pids=()

            rm -f "$tmpdir"/*
            echo "Running pooled database soak round ${round} (8 concurrent requests)..."
            for request in $(seq 1 8); do
              (
                check_database /api/health/database
              ) >"$tmpdir/${round}-${request}.log" 2>&1 &
              pids+=("$!")
            done

            for pid in "${pids[@]}"; do
              if ! wait "$pid"; then
                failed=1
              fi
            done

            if [ "$failed" -ne 0 ]; then
              echo "::error::Pooled database soak round ${round} failed."
              cat "$tmpdir"/*.log || true
              return 1
            fi

            check_database /api/health/database-direct
            echo "  pooled and direct database checks passed for round ${round}."
          }

          run_pool_round 1
          echo "Pausing 20 seconds to cross the previous 15-second idle-retirement window..."
          sleep 20
          run_pool_round 2
          sleep 5
          run_pool_round 3

      - name: Remove stale Cypress users
        env:
          CYPRESS_BASE_API_URL: https://kind-robots.vercel.app/api
          CYPRESS_BETA_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          CYPRESS_API_KEY: ${{ secrets.CYPRESS_API_KEY }}
          CYPRESS_CLEANUP_PHASE: before-run
        run: node scripts/cleanup-cypress-users.mjs

      - name: Run Cypress tests
        id: cypress
        uses: cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
          record: ${{ secrets.CYPRESS_RECORD_KEY != '' }}
        env:
          CYPRESS_BASE_API_URL: https://kind-robots.vercel.app/api
          CYPRESS_BETA_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          CYPRESS_API_KEY: ${{ secrets.CYPRESS_API_KEY }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_TIMING_LOG: '1'
          CYPRESS_SYNTHETIC_SOURCE: github-actions-cypress
          CYPRESS_SYNTHETIC_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

      - name: Remove Cypress users after run
        if: always() && steps.cypress.outcome != 'skipped'
        env:
          CYPRESS_BASE_API_URL: https://kind-robots.vercel.app/api
          CYPRESS_BETA_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          CYPRESS_API_KEY: ${{ secrets.CYPRESS_API_KEY }}
          CYPRESS_CLEANUP_PHASE: after-run
        run: node scripts/cleanup-cypress-users.mjs

      - name: Verify Cypress cleanup
        # Only meaningful when Cypress actually ran. When an earlier gate (deploy
        # wait / DB readiness) fails, the test step is skipped and produces no
        # reports — running verify then just masks the real failure.
        if: always() && steps.cypress.outcome != 'skipped'
        run: node scripts/verify-cypress-cleanup.mjs

      - name: Upload Cypress diagnostic reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-diagnostics
          path: |
            .cypress-cache/timing-latest.json
            .cypress-cache/seed-cleanup-latest.json
            .cypress-cache/orphan-user-sweep-latest.json
            .cypress-cache/user-cleanup-*.json
          if-no-files-found: warn

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
