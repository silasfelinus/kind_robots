name: Apply Creative Dream Projection Boundary

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/kindrobots
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/hide-legacy-dream-projections
          fetch-depth: 1
          show-progress: false

      - name: Apply strict creative Dream projection boundary
        shell: bash
        run: |
          set -o pipefail
          python utils/scripts/apply_creative_dream_projection_boundary.py 2>&1 | tee creative-dream-projection.log

      - name: Upload transformation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: creative-dream-projection-log
          path: creative-dream-projection.log
          if-no-files-found: warn

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Vue and TypeScript
        run: npm run test

      - name: Run Contract Tests
        run: npm run test:art-request-yaml

      - name: Commit validated projection boundary
        run: |
          git config user.name "kind-robots-agent"
          git config user.email "actions@users.noreply.github.com"
          git add stores/dreamStore.ts \
            components/dreams/dream-gallery.vue \
            components/dreams/dream-relationship-gallery.vue \
            components/dreams/dream-manager.vue
          git commit -m "Hide legacy rows from Dream projections"
          git push origin HEAD:agent/hide-legacy-dream-projections
