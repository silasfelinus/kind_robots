name: Apply Genre Facet Runtime Cutover

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/kindrobots
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/remove-genre-dream-runtime
          fetch-depth: 1
          show-progress: false

      - name: Fix Serendipity empty-state loading guard
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('components/pages/serendipity-page.vue')
          source = path.read_text(encoding='utf-8')
          old = '!locationDreams.length && !genreFacets.length && !dreamStore.loading || facetStore.loading'
          new = '!locationDreams.length &&\n            !genreFacets.length &&\n            !dreamStore.loading &&\n            !facetStore.loading'
          if source.count(old) != 1:
              raise RuntimeError(f'expected one loading guard, found {source.count(old)}')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Vue and TypeScript
        run: npm run test

      - name: Run Contract Tests
        run: npm run test:art-request-yaml

      - name: Commit validated loading-state fix
        run: |
          git config user.name "kind-robots-agent"
          git config user.email "actions@users.noreply.github.com"
          git add components/pages/serendipity-page.vue
          git commit -m "Fix Serendipity Facet loading state"
          git push origin HEAD:agent/remove-genre-dream-runtime
