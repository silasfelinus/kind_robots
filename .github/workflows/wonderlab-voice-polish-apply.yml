name: WonderLab Voice Polish Apply

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/wonderlab-voice-polish-apply.yml'
      - 'scripts/apply-wonderlab-voice-polish-batch.mjs'
      - 'scripts/wonderlab-definitive-inventory.mjs'
      - 'config/*wonderlab-voice-polish-batch*.json'
  push:
    branches: [main]
    paths:
      - '.github/workflows/wonderlab-voice-polish-apply.yml'
      - 'scripts/apply-wonderlab-voice-polish-batch.mjs'
      - 'scripts/wonderlab-definitive-inventory.mjs'
      - 'config/*wonderlab-voice-polish-batch*.json'
  workflow_dispatch:
    inputs:
      manifest:
        description: 'Voice-polish manifest path'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: wonderlab-voice-polish-apply
  cancel-in-progress: false

jobs:
  validate:
    name: Validate guarded voice-polish manifests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate scripts and manifests
        run: |
          set -euo pipefail
          node --check scripts/apply-wonderlab-voice-polish-batch.mjs
          node --check scripts/wonderlab-definitive-inventory.mjs
          node <<'NODE'
          const fs = require('node:fs')
          const assert = require('node:assert').strict
          const paths = fs.readdirSync('config')
            .filter((name) => /^wonderlab-voice-polish-batch-\d+\.json$/.test(name))
            .sort()
            .map((name) => `config/${name}`)
          assert.ok(paths.length >= 4, 'expected the definitive batch manifest')
          for (const path of paths) {
            const manifest = JSON.parse(fs.readFileSync(path, 'utf8'))
            assert.equal(manifest.version, 1)
            assert.match(manifest.minimumProductionCommit, /^[0-9a-f]{40}$/)
            assert.ok(Array.isArray(manifest.revisions))
            assert.ok(manifest.revisions.length > 0 && manifest.revisions.length <= 20)
            assert.ok(new Set(manifest.revisions.map((entry) => entry.componentId)).size <= 10)
            assert.equal(new Set(manifest.revisions.map((entry) => entry.draftId)).size, manifest.revisions.length)
            assert.equal(new Set(manifest.revisions.map((entry) => entry.reactionId)).size, manifest.revisions.length)
            const lengths = []
            for (const entry of manifest.revisions) {
              assert.ok(Number.isInteger(entry.draftId) && entry.draftId > 0)
              assert.ok(Number.isInteger(entry.reactionId) && entry.reactionId > 0)
              assert.ok(Number.isInteger(entry.componentId) && entry.componentId > 0)
              assert.ok(['BOT', 'CHARACTER'].includes(entry.author?.kind))
              assert.ok(Number.isInteger(entry.author?.id) && entry.author.id > 0)
              assert.match(entry.expectedCurrentCommentHash, /^[0-9a-f]{64}$/)
              assert.ok(entry.sourceKey.endsWith('.vue') && fs.existsSync(entry.sourceKey))
              const length = String(entry.editedComment || '').trim().length
              assert.ok(length >= 1)
              assert.ok(entry.editedComment.length <= 2000)
              lengths.push(length)
            }
            if (manifest.editorialContract?.verbosity) {
              assert.ok(Math.min(...lengths) < 80, `${path} must prove micro-flavor is permitted`)
              assert.ok(Math.max(...lengths) >= Math.min(...lengths) * 4, `${path} lacks deliberate verbosity range`)
            }
          }
          const runner = fs.readFileSync('scripts/apply-wonderlab-voice-polish-batch.mjs', 'utf8')
          for (const required of [
            '/review-drafts/${revision.draftId}/revise',
            'expectedCurrentCommentHash',
            'assertPublicLock',
            'beforeDraft.status',
            'afterDraft.status',
            'publisherUserId',
            'flavorLength',
          ]) assert.ok(runner.includes(required), `missing guarded apply boundary: ${required}`)
          for (const forbidden of [
            '/publish',
            '/generate',
            '/approve',
            '/reject',
            'DATABASE_URL',
            'prisma.',
          ]) assert.ok(!runner.includes(forbidden), `voice-polish runner crossed boundary: ${forbidden}`)
          console.log(`WonderLab guarded flavor manifests passed: ${paths.length}.`)
          NODE

  apply:
    name: Revise published flavor in place
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[wonderlab-voice-polish-apply]'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Resolve manifest
        id: manifest
        env:
          INPUT_MANIFEST: ${{ github.event.inputs.manifest || '' }}
        run: |
          set -euo pipefail
          manifest="$INPUT_MANIFEST"
          if [ -z "$manifest" ]; then
            manifest="$(find config -maxdepth 1 -type f -name 'wonderlab-voice-polish-batch-*.json' | sort -V | tail -n 1)"
          fi
          test -n "$manifest"
          test -f "$manifest"
          echo "path=$manifest" >> "$GITHUB_OUTPUT"
          echo "minimum=$(jq -r '.minimumProductionCommit' "$manifest")" >> "$GITHUB_OUTPUT"
          echo "batch=$(jq -r '.batchId' "$manifest")" >> "$GITHUB_OUTPUT"
      - name: Verify revision endpoint ancestry
        env:
          BASE_URL: https://kind-robots.vercel.app
          MINIMUM_COMMIT: ${{ steps.manifest.outputs.minimum }}
        run: |
          set -euo pipefail
          body="$(curl -sf --max-time 20 "$BASE_URL/api/version")"
          live="$(printf '%s' "$body" | jq -r '.data.commit // empty')"
          test -n "$live"
          if ! git cat-file -e "${live}^{commit}" 2>/dev/null; then
            git fetch --quiet origin main
          fi
          if ! git merge-base --is-ancestor "$MINIMUM_COMMIT" "$live"; then
            echo "::error::Production $live does not contain guarded revision commit $MINIMUM_COMMIT."
            exit 1
          fi
          echo "Production $live contains the guarded revision endpoint."
      - name: Apply exact voice-polish revisions
        env:
          WONDERLAB_BASE_URL: https://kind-robots.vercel.app
          WONDERLAB_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          WONDERLAB_VOICE_POLISH_MANIFEST: ${{ steps.manifest.outputs.path }}
          WONDERLAB_VOICE_POLISH_OUTPUT: wonderlab-voice-polish-apply-artifacts
        run: node scripts/apply-wonderlab-voice-polish-batch.mjs
      - name: Re-audit full published corpus
        env:
          WONDERLAB_BASE_URL: https://kind-robots.vercel.app
          WONDERLAB_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          WONDERLAB_DEFINITIVE_OUTPUT: wonderlab-voice-polish-post-audit
        run: node scripts/wonderlab-definitive-inventory.mjs
      - name: Upload voice-polish evidence
        uses: actions/upload-artifact@v4
        with:
          name: wonderlab-voice-polish-${{ steps.manifest.outputs.batch }}-${{ github.run_id }}
          path: |
            wonderlab-voice-polish-apply-artifacts
            wonderlab-voice-polish-post-audit
          retention-days: 30
      - name: Write workflow summary
        env:
          APPLY_REPORT: wonderlab-voice-polish-apply-artifacts/wonderlab-voice-polish-apply.json
          APPLY_COMMENT: wonderlab-voice-polish-apply-artifacts/wonderlab-voice-polish-apply.md
          AUDIT_REPORT: wonderlab-voice-polish-post-audit/wonderlab-definitive-inventory.json
        run: |
          set -euo pipefail
          cat "$APPLY_COMMENT" >> "$GITHUB_STEP_SUMMARY"
          printf '\n## Full-corpus post-audit\n\n' >> "$GITHUB_STEP_SUMMARY"
          published="$(jq -r '.scan.publishedReviews' "$AUDIT_REPORT")"
          first="$(jq -r '.scan.firstDraftId' "$AUDIT_REPORT")"
          last="$(jq -r '.scan.lastDraftId' "$AUDIT_REPORT")"
          highest="$(jq -r '.scan.highestDraftId' "$AUDIT_REPORT")"
          production="$(jq -r '.production.commit // "unknown"' "$AUDIT_REPORT")"
          deployment="$(jq -r '.production.deploymentId // "unknown"' "$AUDIT_REPORT")"
          printf '%s\n' \
            "- **Published reviews captured:** $published" \
            "- **Draft range:** #$first–#$last" \
            "- **Highest draft ID scanned:** #$highest" \
            "- **Production:** \`$production\` · deployment \`$deployment\`" \
            >> "$GITHUB_STEP_SUMMARY"
