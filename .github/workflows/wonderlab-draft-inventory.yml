name: WonderLab Draft Slot Inventory
# inventory trigger: 2

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/wonderlab-draft-inventory.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: wonderlab-draft-slot-inventory
  cancel-in-progress: true

jobs:
  inventory:
    name: Inventory current planner draft slots
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Read production portfolio and exact drafts
        env:
          WONDERLAB_ADMIN_TOKEN: ${{ secrets.CYPRESS_BETA_ADMIN_TOKEN }}
          BASE_URL: https://kind-robots.vercel.app
        run: |
          set -euo pipefail
          test -n "${WONDERLAB_ADMIN_TOKEN:-}"
          mkdir -p wonderlab-draft-inventory-artifacts
          node <<'NODE'
          const fs = require('node:fs')
          const baseUrl = process.env.BASE_URL.replace(/\/$/, '')
          const token = process.env.WONDERLAB_ADMIN_TOKEN
          const headers = {
            accept: 'application/json',
            'content-type': 'application/json',
            'x-beta-admin-token': token,
            'x-admin-token': token,
            'x-api-key': token,
          }

          async function request(path, admin = true) {
            const response = await fetch(`${baseUrl}${path}`, {
              headers: admin ? headers : { accept: 'application/json' },
            })
            const text = await response.text()
            const body = text ? JSON.parse(text) : null
            if (!response.ok) throw new Error(`${path} returned ${response.status}: ${body?.message || text}`)
            return body?.data
          }

          const query = new URLSearchParams({
            limit: '500',
            reviewersPerComponent: '2',
            minimumScore: '0',
            diversityPenalty: '4',
            minimumAssignmentsPerReviewer: '2',
            representationMinimumScore: '1',
          })

          const [version, rollout, portfolio] = await Promise.all([
            request('/api/version', false),
            request('/api/admin/wonderlab/review-rollout'),
            request(`/api/admin/wonderlab/review-portfolio?${query}`),
          ])
          if (rollout?.ready !== true) throw new Error('Durable WonderLab rollout audit is not Ready.')
          if (!Array.isArray(portfolio?.exhibits)) throw new Error('Portfolio did not return exhibits.')

          const assignments = portfolio.exhibits.flatMap((exhibit) =>
            (exhibit.reviewers || [])
              .filter((reviewer) => reviewer.coverage === 'DRAFTED')
              .map((reviewer) => ({
                componentId: Number(exhibit.componentId),
                componentName: exhibit.componentName,
                title: exhibit.title || null,
                folderName: exhibit.folderName,
                sourcePath: exhibit.sourcePath || null,
                status: exhibit.status,
                reviewer: {
                  kind: reviewer.author.kind,
                  id: Number(reviewer.author.id),
                  name: reviewer.name,
                  slug: reviewer.slug || null,
                  score: Number(reviewer.score) || 0,
                  reasons: reviewer.reasons || [],
                },
                draftId: Number(reviewer.draftId),
                draftStatus: reviewer.draftStatus,
              })),
          )

          if (assignments.length !== 29) {
            throw new Error(`Expected 29 drafted planner slots, received ${assignments.length}.`)
          }
          const componentIds = [...new Set(assignments.map((entry) => entry.componentId))]
          const draftRows = new Map()
          for (const componentId of componentIds) {
            const drafts = await request(`/api/admin/wonderlab/review-drafts?componentId=${componentId}`)
            if (!Array.isArray(drafts)) throw new Error(`Draft query for Component #${componentId} was not an array.`)
            for (const draft of drafts) draftRows.set(Number(draft.id), draft)
          }

          const exactAssignments = assignments.map((assignment) => {
            const draft = draftRows.get(assignment.draftId)
            if (!draft) throw new Error(`Draft #${assignment.draftId} was not returned for Component #${assignment.componentId}.`)
            return { ...assignment, draft }
          })

          const report = {
            generatedAt: new Date().toISOString(),
            production: version,
            rolloutReady: true,
            assignmentCount: exactAssignments.length,
            componentCount: componentIds.length,
            assignments: exactAssignments,
          }
          fs.writeFileSync(
            'wonderlab-draft-inventory-artifacts/draft-slot-inventory.json',
            `${JSON.stringify(report, null, 2)}\n`,
          )
          NODE

      - name: Post exact inventory to issue 582
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const report = JSON.parse(fs.readFileSync('wonderlab-draft-inventory-artifacts/draft-slot-inventory.json', 'utf8'))
          const lines = [
            '## WonderLab exact draft-slot inventory',
            '',
            `- **Workflow:** [run ${process.env.RUN_ID}](https://github.com/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID})`,
            `- **Production:** \`${report.production?.commit || 'unknown'}\` · deployment \`${report.production?.deploymentId || 'unknown'}\``,
            `- **Draft-only planner assignments:** ${report.assignmentCount}`,
            `- **Affected Components:** ${report.componentCount}`,
            '',
          ]
          for (const entry of report.assignments) {
            lines.push(`- Component #${entry.componentId} **${entry.componentName}** → ${entry.reviewer.name} (${entry.reviewer.kind} #${entry.reviewer.id}) · draft #${entry.draftId} · ${entry.draftStatus} · \`${entry.sourcePath}\``)
          }
          lines.push('', 'This is a read-only inventory. No draft was edited, approved, regenerated, or published.')
          const [owner, repo] = process.env.REPOSITORY.split('/')
          const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/582/comments`, {
            method: 'POST',
            headers: {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${process.env.GH_TOKEN}`,
              'content-type': 'application/json',
              'x-github-api-version': '2022-11-28',
            },
            body: JSON.stringify({ body: lines.join('\n') }),
          })
          if (!response.ok) throw new Error(`Issue comment failed: ${response.status} ${await response.text()}`)
          NODE

      - name: Upload exact inventory
        uses: actions/upload-artifact@v4
        with:
          name: wonderlab-draft-slot-inventory-${{ github.run_id }}
          path: wonderlab-draft-inventory-artifacts
          if-no-files-found: error
          retention-days: 30
