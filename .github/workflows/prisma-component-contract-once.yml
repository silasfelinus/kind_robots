name: Prisma Component Contract Once

on:
  push:
    branches:
      - fix/wonderlab-remove-legacy-component-status
    paths:
      - '.github/workflows/prisma-component-contract-once.yml'
      - 'prisma/schema.prisma'

permissions:
  contents: write

concurrency:
  group: prisma-component-contract-once
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/wonderlab-remove-legacy-component-status
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        env:
          CYPRESS_INSTALL_BINARY: '0'
        run: npm ci

      - name: Remove redundant Component columns and create migration
        run: |
          python <<'PY'
          from pathlib import Path

          schema_path = Path('prisma/schema.prisma')
          schema = schema_path.read_text()
          start = schema.index('model Component {')
          end = schema.index('\n}\n', start) + 3
          block = schema[start:end]
          legacy_lines = [
              '  isWorking         Boolean         @default(true)\n',
              '  underConstruction Boolean         @default(false)\n',
              '  isBroken          Boolean         @default(false)\n',
          ]
          present = [line in block for line in legacy_lines]

          if any(present) and not all(present):
              raise SystemExit('Component legacy status columns are only partially present.')

          if all(present):
              for line in legacy_lines:
                  block = block.replace(line, '', 1)
              schema = schema[:start] + block + schema[end:]
              schema_path.write_text(schema)

          migration_dir = Path(
              'prisma/migrations/20260719125500_component_canonical_contract'
          )
          migration_dir.mkdir(parents=True, exist_ok=True)
          migration_dir.joinpath('migration.sql').write_text(
              '-- Remove redundant Component status booleans after canonical production verification.\n'
              '-- Component.status is NOT NULL and was backfilled before this contract migration.\n\n'
              'ALTER TABLE `Component`\n'
              '  DROP COLUMN `isWorking`,\n'
              '  DROP COLUMN `underConstruction`,\n'
              '  DROP COLUMN `isBroken`;\n'
          )
          PY

      - name: Regenerate Prisma client
        run: npx prisma generate

      - name: Commit generated contract
        run: |
          set -euo pipefail
          if git diff --quiet -- prisma/schema.prisma prisma/migrations prisma/generated/prisma; then
            echo 'Prisma Component contract is already generated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add prisma/schema.prisma prisma/migrations prisma/generated/prisma
          git commit -m 'Regenerate Prisma client without legacy Component status [skip prisma-contract]'
          git push origin HEAD:fix/wonderlab-remove-legacy-component-status
