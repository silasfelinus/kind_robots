name: Thin Social Store Codemod

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/thin-social-store-codemod.yml'

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'run Social store codemod')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/thin-social-api
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Apply guarded codemod
        run: node scripts/refactor-thin-social-store.mjs

      - name: Commit transformed file
        run: |
          git config user.name "kind-robots-refactor"
          git config user.email "kind-robots-refactor@users.noreply.github.com"
          git add stores/socialStore.ts
          git diff --staged --quiet && exit 1
          git commit -m "refactor(socials): merge bounded aggregate mutations in store [skip ci]"
          git push origin HEAD:refactor/thin-social-api
