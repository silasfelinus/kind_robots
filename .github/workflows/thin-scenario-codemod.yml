name: Thin Scenario Codemod

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/thin-scenario-codemod.yml'

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'run Scenario codemod')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/thin-scenario-api
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Apply guarded codemod
        run: node scripts/refactor-thin-scenario-store.mjs

      - name: Commit transformed files
        run: |
          git config user.name "kind-robots-refactor"
          git config user.email "kind-robots-refactor@users.noreply.github.com"
          git add server/api/scenarios/[id].patch.ts stores/scenarioStore.ts
          git diff --staged --quiet && exit 1
          git commit -m "refactor(scenarios): hydrate details after lean mutations [skip ci]"
          git push origin HEAD:refactor/thin-scenario-api
