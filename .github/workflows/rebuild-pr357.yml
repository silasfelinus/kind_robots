name: Rebuild PR 357

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: rebuild-pr357-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rebuild:
    if: github.head_ref == 'agent/remove-code-compositions-resolved'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/kindrobots
      CYPRESS_INSTALL_BINARY: '0'

    steps:
      - name: Checkout resolved branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-code-compositions-resolved
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Replay PR changes without stale Prisma output
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/remove-code-compositions

          git diff --binary --find-renames=50% \
            5dbb8b8a3a8d183bed91a1a6e72faf492bd8e0be..origin/agent/remove-code-compositions \
            -- . \
            ':(exclude).github/workflows/resolve-pr357-conflicts.yml' \
            ':(exclude)scripts/resolve-pr357-conflicts.mjs' \
            ':(exclude)prisma/schema.prisma' \
            ':(exclude)prisma/generated/prisma/**' \
            ':(exclude)public/components.json' \
            > /tmp/pr357.patch

          git apply --index --3way /tmp/pr357.patch
          node scripts/rebuild-pr357-schema.mjs
          git add prisma/schema.prisma

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate Prisma and component catalog
        shell: bash
        run: |
          set -euo pipefail
          npx prisma format
          rm -rf prisma/generated/prisma
          npx prisma generate
          node utils/scripts/create-component-json.mjs
          git add prisma/schema.prisma prisma/generated/prisma public/components.json

      - name: Verify retired feature removal
        shell: bash
        run: |
          set -euo pipefail
          test ! -e components/code
          test ! -e components/composition
          test ! -e stores/codeStore.ts
          test ! -e stores/compositionStore.ts
          test ! -e server/api/code
          test ! -e server/api/compositions
          test ! -e cypress/e2e/api/compositions.cy.ts
          test ! -e utils/codeExecutors.ts
          test -d abandonware/components/code
          test -d abandonware/components/composition

          if git grep -nE 'model (Code|Composition)|CompositionStatus|compositionId|compositionIds|prisma\.(code|composition)|use(Code|Composition)Store|/api/(code|compositions)|Compositions:' -- \
            prisma/schema.prisma \
            prisma/generated/prisma \
            components \
            stores \
            server \
            cypress \
            utils \
            scripts \
            ':!scripts/rebuild-pr357-schema.mjs'; then
            echo 'Retired Code or Composition feature references remain.'
            exit 1
          fi

      - name: Remove temporary rebuild machinery
        run: |
          rm -f scripts/rebuild-pr357-schema.mjs
          rm -f .github/workflows/rebuild-pr357.yml
          git add -A

      - name: Type check
        run: npm run test

      - name: Validate rebuilt branch
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --cached --stat
          git diff --cached --quiet && exit 1

      - name: Commit and push rebuilt branch
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "Rebuild Code and Composition removal on latest main"
          git push origin HEAD:agent/remove-code-compositions-resolved
