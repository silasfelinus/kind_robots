name: Apply Project and Facet Schema

on:
  push:
    branches:
      - agent/project-dream-facet-schema
    paths:
      - .github/workflows/apply-project-facet-schema.yml
      - utils/scripts/applyProjectFacetSchema.mjs
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/project-dream-facet-schema

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply additive schema patch
        run: node utils/scripts/applyProjectFacetSchema.mjs

      - name: Format Prisma schema
        run: npx prisma format
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/kindrobots

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/kindrobots

      - name: Type check
        run: npm run test

      - name: Check diff whitespace
        run: git diff --check

      - name: Commit generated schema milestone
        run: |
          if git diff --quiet; then
            echo "Schema milestone already applied."
            exit 0
          fi
          git config user.name "kind-robots-schema-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prisma/schema.prisma prisma/migrations package.json
          git commit -m "Add Project and Facet schema foundation"
          git push origin HEAD:agent/project-dream-facet-schema
