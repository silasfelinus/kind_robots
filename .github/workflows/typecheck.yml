name: TypeScript Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/kindrobots

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Dream delete referential actions
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/dream-delete-referential-actions'
        run: node scripts/build-dream-delete-referential-actions.mjs

      - name: Format and generate Prisma client
        run: |
          npx prisma format
          npx prisma generate

      - name: Format changed source
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/dream-delete-referential-actions'
        run: >-
          npx prettier --write
          cypress/e2e/api/dream-delete-referential-actions.cy.ts
          docs/architecture/thin-resource-api-audit.md
          server/api/dreams/[id].delete.ts

      - name: Package Dream delete output
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/dream-delete-referential-actions'
        shell: bash
        run: |
          set -euo pipefail
          output=/tmp/dream-delete-output
          rm -rf "$output"
          mkdir -p "$output"

          copy_path() {
            local file="$1"
            mkdir -p "$output/$(dirname "$file")"
            cp "$file" "$output/$file"
          }

          while IFS= read -r -d '' file; do
            copy_path "$file"
          done < <(git diff --name-only --diff-filter=ACMRT -z)

          while IFS= read -r -d '' file; do
            copy_path "$file"
          done < <(git ls-files --others --exclude-standard -z)

          git diff --stat > "$output/diff-stat.txt"

      - name: Upload Dream delete output
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/dream-delete-referential-actions'
        uses: actions/upload-artifact@v4
        with:
          name: dream-delete-output
          retention-days: 3
          if-no-files-found: error
          path: /tmp/dream-delete-output

      - name: Type check
        run: npm run test > /tmp/typecheck.log 2>&1

      - name: Commit verified Dream delete changes
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/dream-delete-referential-actions'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "kind-robots-refactor"
          git config user.email "kind-robots-refactor@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "refactor: declare Dream delete referential actions [skip ci]"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          retention-days: 3
          if-no-files-found: warn
          path: /tmp/typecheck.log
