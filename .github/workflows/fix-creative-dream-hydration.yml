name: Fix Creative Dream Hydration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/kindrobots
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/hide-legacy-dream-projections
          fetch-depth: 1
          show-progress: false

      - name: Clear legacy Dream selections after hydration
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('stores/dreamStore.ts')
          source = path.read_text(encoding='utf-8')
          old = "    hydrateFromLegacyPitchStorage()\n  }\n\n  function loadFromLocalStorage()"
          new = "    hydrateFromLegacyPitchStorage()\n\n    selectedDreams.value = selectedDreams.value.filter(isCreativeDream)\n\n    if (selectedDream.value && !isCreativeDream(selectedDream.value)) {\n      selectedDream.value = null\n      dreamForm.value = {}\n      dreamChats.value = []\n      chatForm.value = {}\n    }\n\n    if (selectedTitle.value && !isCreativeDream(selectedTitle.value)) {\n      selectedTitle.value = null\n    }\n\n    if (\n      dreamForm.value.dreamType === 'PROJECT' ||\n      dreamForm.value.dreamType === 'GENRE'\n    ) {\n      dreamForm.value = {}\n    }\n\n    if (\n      selectedDreamType.value === 'PROJECT' ||\n      selectedDreamType.value === 'GENRE'\n    ) {\n      selectedDreamType.value = null\n    }\n  }\n\n  function loadFromLocalStorage()"
          if source.count(old) != 1:
              raise RuntimeError(f'expected one hydration cleanup anchor, found {source.count(old)}')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Vue and TypeScript
        run: npm run test

      - name: Run Contract Tests
        run: npm run test:art-request-yaml

      - name: Commit validated hydration cleanup
        run: |
          git config user.name "kind-robots-agent"
          git config user.email "actions@users.noreply.github.com"
          git add stores/dreamStore.ts
          git commit -m "Clear legacy Dream selections after hydration"
          git push origin HEAD:agent/hide-legacy-dream-projections
