name: Fix PitchSheet Followups

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-pitch-sheet-followups.yml'

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'run PitchSheet follow-up fix')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/thin-pitch-sheet-api
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Apply guarded corrections
        run: node scripts/fix-pitch-sheet-followups.mjs

      - name: Commit transformed files
        run: |
          git config user.name "kind-robots-refactor"
          git config user.email "kind-robots-refactor@users.noreply.github.com"
          git add stores/sheetStore.ts cypress/e2e/api/sheets.cy.ts
          git diff --staged --quiet && exit 1
          git commit -m "fix(sheets): correct command status and deletion test [skip ci]"
          git push origin HEAD:refactor/thin-pitch-sheet-api
