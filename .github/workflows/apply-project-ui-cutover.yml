name: Apply Project UI Cutover

on:
  push:
    branches:
      - agent/remove-project-dream-ui-fallbacks
    paths:
      - utils/scripts/remove_project_dream_ui_fallbacks.py
      - .github/workflows/apply-project-ui-cutover.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/kindrobots
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/remove-project-dream-ui-fallbacks
          fetch-depth: 1
          show-progress: false

      - name: Add strict residual template replacements
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('utils/scripts/remove_project_dream_ui_fallbacks.py')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              'from pathlib import Path\n',
              'from pathlib import Path\nimport re\n',
              1,
          )
          anchor = "assert_absent(\n    page,"
          insert = r'''page = re.sub(
              r'getProjectPriority\(\s*projectDreamForSlug\(project\.slug\)\?\.id,?\s*\)',
              "(projectRecordForSlug(project.slug)?.priority as DreamPriority | undefined) ?? 'NORMAL'",
              page,
          )
          page = replace_all(
              page,
              'projectDreamForSlug(project.slug)?.flavorText',
              'projectRecordForSlug(project.slug)?.flavorText',
              'replace Project gallery flavor fallbacks',
          )
          page = page.replace('linkedDream?.id ?? null', 'null')
          page = replace_all(
              page,
              '      dreamId: linkedDream.value?.id ?? null,\n',
              '',
              'remove Project Dream IDs from Project writes',
          )
          '''
          if source.count(anchor) != 1:
              raise SystemExit(f'expected one Conductor assertion anchor, found {source.count(anchor)}')
          source = source.replace(anchor, insert + anchor, 1)
          path.write_text(source, encoding='utf-8')
          PY

      - name: Apply strict Project UI transformation
        shell: bash
        run: |
          set -o pipefail
          python utils/scripts/remove_project_dream_ui_fallbacks.py 2>&1 | tee project-ui-cutover.log

      - name: Upload transformation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-ui-cutover-log
          path: project-ui-cutover.log
          if-no-files-found: error

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Vue and TypeScript
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee project-ui-typecheck.log

      - name: Upload Vue and TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-ui-typecheck-log
          path: project-ui-typecheck.log
          if-no-files-found: warn

      - name: Commit validated application files
        run: |
          git config user.name "kind-robots-agent"
          git config user.email "actions@users.noreply.github.com"
          git add components/pages/conductor-page.vue \
            components/pages/conductor-overview-gallery-page.vue \
            stores/dreamStore.ts
          git commit -m "Remove Project Dream UI fallbacks"
          git push origin HEAD:agent/remove-project-dream-ui-fallbacks
