name: Apply Legacy Genre Dream Boundary

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/kindrobots
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/legacy-genre-dream-readonly
          fetch-depth: 1
          show-progress: false

      - name: Apply strict legacy Genre Dream boundary
        run: python utils/scripts/apply_legacy_genre_dream_boundary.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Vue and TypeScript
        run: npm run test

      - name: Run Contract Tests
        run: npm run test:art-request-yaml

      - name: Commit validated Genre boundary
        run: |
          git config user.name "kind-robots-agent"
          git config user.email "actions@users.noreply.github.com"
          git add server/api/dreams/index.ts \
            'server/api/dreams/[id].patch.ts' \
            'server/api/dreams/[id].delete.ts' \
            server/api/chats/index.post.ts \
            stores/helpers/dreamHelper.ts \
            stores/helpers/dreamCards.ts
          git commit -m "Make legacy Genre Dreams read-only"
          git push origin HEAD:agent/legacy-genre-dream-readonly
