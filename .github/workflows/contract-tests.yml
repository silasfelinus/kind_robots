name: Contract Tests

# Fast, DB-free contract checks for cross-repo and content-driven contracts.
# No database or Nuxt build is needed, so these can gate every pull request.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: contract-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-tests:
    name: Contract verifiers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history (not the default shallow depth-1 clone) so the
          # capture-group guard contract below can diff the PR branch against
          # origin/main via a merge-base-aware `git diff`.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Art-request YAML indentation contract
        run: npm run test:art-request-yaml

      - name: Channel content contract
        run: npm run test:channel-content

      - name: Channel resolver contract
        run: npm run test:channel-resolver

      - name: Data surface manifest contract
        run: npm run test:data-surface-manifest

      - name: Database pool defaults contract
        run: npm run test:database-pool-defaults

      - name: Academy style-detail caller-doc contract
        run: npm run test:academy-style-detail-callers

      - name: Academy starter manifest provenance contract
        run: npm run test:academy-starter-manifest

      - name: Academy examples manifest provenance contract
        run: npm run test:academy-examples-manifest 2>&1 | tee academy-examples-contract.txt

      - name: Navigation route access contract
        run: npx tsx utils/scripts/verifyNavigationRouteAccess.ts

      - name: Workflow path references contract
        run: npm run test:workflow-paths

      - name: Deploy-wait ancestry check contract
        run: npm run test:deploy-wait-ancestry

      - name: Prisma JSON-cast contract
        run: npm run test:no-prisma-json-cast

      - name: Capture-group guard checker self-test
        run: npm run test:capture-group-guards-selftest

      - name: Pack manifest validator self-test
        run: npm run test:pack-manifest

      - name: Pack scaffold extraction self-test
        run: npm run test:pack-scaffold-extraction

      - name: mysql:// URL parser contract
        run: npm run test:parse-mysql-url

      - name: WonderLab reconciliation contract
        run: npm run test:wonderlab-reconcile

      - name: WonderLab test-fixture cleanup contract
        run: npm run test:wonderlab-fixture-cleanup

      - name: WonderLab core preview fixtures contract
        run: npm run test:wonderlab-core-fixtures

      - name: WonderLab visual preview fixtures contract
        run: npm run test:wonderlab-visual-fixtures

      - name: WonderLab UI preview fixtures contract
        run: npm run test:wonderlab-ui-fixtures

      - name: WonderLab achievement and navigation fixtures contract
        run: npm run test:wonderlab-achievement-navigation-fixtures

      - name: WonderLab passive card fixtures contract
        run: npm run test:wonderlab-passive-card-fixtures

      - name: WonderLab learning and control fixtures contract
        run: npx tsx utils/scripts/verifyWonderLabLearningControlFixtures.ts

      - name: WonderLab Builder and Ruler Hooked fixtures contract
        run: npx tsx utils/scripts/verifyWonderLabBuilderRulerFixtures.ts

      - name: WonderLab interaction and display fixtures contract
        run: npx tsx utils/scripts/verifyWonderLabInteractionDisplayFixtures.ts

      - name: WonderLab final coverage fixtures contract
        run: npx tsx utils/scripts/verifyWonderLabCoverageClosureFixtures.ts

      - name: WonderLab component manifest source contract
        run: npx tsx utils/scripts/verifyWonderLabComponentManifest.ts

      - name: WonderLab registry health contract
        run: npx tsx utils/scripts/verifyWonderLabRegistryHealth.ts

      - name: WonderLab museum URL query contract
        run: npx tsx utils/scripts/verifyWonderLabMuseumQuery.ts

      - name: WonderLab single load-owner contract
        run: npx tsx utils/scripts/verifyWonderLabLoadOwnership.ts

      - name: WonderLab canonical manifest contract
        run: npx tsx utils/scripts/verifyWonderLabCanonicalManifest.ts

      - name: WonderLab reviewer affinity contract
        run: npx tsx utils/scripts/verifyWonderLabReviewerAffinity.ts

      - name: WonderLab review draft prompt contract
        run: npx tsx utils/scripts/verifyWonderLabReviewDraftPrompt.ts

      - name: Component canonical expand migration contract
        run: npx tsx utils/scripts/verifyComponentCanonicalExpand.ts

      - name: Component canonical runtime adoption contract
        run: npx tsx utils/scripts/verifyComponentCanonicalRuntime.ts

      - name: WonderLab preview coverage no-regression gate
        run: npm run audit:wonderlab-previews -- --strict 2>&1 | tee wonderlab-preview-audit.txt

      - name: Fetch main for capture-group guard diff
        # actions/checkout only fetches the ref it checks out (the PR's
        # merge ref, not a local `origin/main`), even with fetch-depth: 0 --
        # this creates/updates that remote-tracking ref so the diff below
        # has something to diff against.
        run: git fetch origin main

      - name: Capture-group guard contract (new/changed lines vs main)
        run: npm run test:capture-group-guards -- origin/main

      - name: Challenge Center seed validation (dry run, no database)
        run: |
          npm run test:seed-challenges
          npm run test:seed-contenders

      - name: Channel artwork audit
        run: npm run audit:channel-assets 2>&1 | tee channel-artwork-audit.txt

      - name: Upload contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-diagnostics
          path: |
            academy-examples-contract.txt
            channel-artwork-audit.txt
            wonderlab-preview-audit.txt
          if-no-files-found: warn
          retention-days: 14
