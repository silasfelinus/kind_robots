name: Component canonical status UI adoption

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/component-status-ui-adopt.yml
      - .github/scripts/apply-component-status-ui.py

permissions:
  contents: write

jobs:
  adopt-status-ui:
    name: Patch WonderLab canonical status UI
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout adoption branch
        uses: actions/checkout@v4
        with:
          ref: feat/component-prisma-runtime-adoption
          fetch-depth: 0

      - name: Patch WonderLab status UI
        run: python .github/scripts/apply-component-status-ui.py

      - name: Validate hand-authored diff
        run: git diff --check -- components/wonderlab/lab-interact.vue

      - name: Commit WonderLab status UI
        run: |
          git config user.name "kind-robots-status-ui-adoption"
          git config user.email "kind-robots-status-ui-adoption@users.noreply.github.com"
          git add components/wonderlab/lab-interact.vue
          if git diff --cached --quiet; then
            echo "WonderLab status UI is already current."
            exit 0
          fi
          git commit -m "feat: adopt canonical statuses in WonderLab UI [status-ui-adopt]"
          git push origin HEAD:feat/component-prisma-runtime-adoption
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
