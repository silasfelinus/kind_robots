name: Project and Facet Migration Smoke Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: project-facet-migration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: kindrobots
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/kindrobots

    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Prisma and MariaDB client
        run: |
          mkdir -p /tmp/project-facet-smoke
          cd /tmp/project-facet-smoke
          npm init -y
          npm install prisma@7.8.0
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Download pre-change schema and migration
        run: |
          curl -fsSL https://raw.githubusercontent.com/silasfelinus/kind_robots/3c501d31311307f3c63e07bec869c867fac13655/prisma/schema.prisma -o /tmp/project-facet-smoke/schema.prisma
          curl -fsSL https://raw.githubusercontent.com/silasfelinus/kind_robots/main/prisma/migrations/20260710223000_add_project_and_facet_models/migration.sql -o /tmp/project-facet-smoke/migration.sql
          cat > /tmp/project-facet-smoke/prisma.config.ts <<'CONFIG'
          import 'dotenv/config'
          import { defineConfig } from 'prisma/config'

          export default defineConfig({
            schema: '/tmp/project-facet-smoke/schema.prisma',
            datasource: {
              url: process.env.DATABASE_URL,
            },
          })
          CONFIG

      - name: Create pre-change database
        working-directory: /tmp/project-facet-smoke
        run: npx prisma db push --skip-generate

      - name: Execute Project and Facet migration
        run: mariadb --host=127.0.0.1 --port=3306 --user=root --password=root kindrobots < /tmp/project-facet-smoke/migration.sql

      - name: Confirm new tables and PitchSheet constraint
        run: |
          test "$(mariadb --host=127.0.0.1 --port=3306 --user=root --password=root kindrobots --batch --skip-column-names -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name IN ('Project', 'Facet', 'DreamFacet', 'ScenarioFacet', 'FacetRelation')")" = "5"
          test "$(mariadb --host=127.0.0.1 --port=3306 --user=root --password=root kindrobots --batch --skip-column-names -e "SELECT COUNT(*) FROM information_schema.table_constraints WHERE constraint_schema = DATABASE() AND table_name = 'PitchSheet' AND constraint_name = 'PitchSheet_exactly_one_owner'")" = "1"
