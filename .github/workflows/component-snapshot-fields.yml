name: Component canonical snapshot fields

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/component-snapshot-fields.yml
      - .github/scripts/apply-component-snapshot-fields.py

permissions:
  contents: write

jobs:
  patch-snapshot:
    name: Patch Component fallback snapshot fields
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout canonical client branch
        uses: actions/checkout@v4
        with:
          ref: test/component-canonical-clients
          fetch-depth: 0

      - name: Patch Component snapshot allowlist
        run: python .github/scripts/apply-component-snapshot-fields.py

      - name: Validate diff
        run: git diff --check -- utils/scripts/snapshotFallback.ts

      - name: Commit snapshot allowlist
        run: |
          git config user.name "kind-robots-component-snapshot"
          git config user.email "kind-robots-component-snapshot@users.noreply.github.com"
          git add utils/scripts/snapshotFallback.ts
          if git diff --cached --quiet; then
            echo "Component fallback snapshot fields are already current."
            exit 0
          fi
          git commit -m "chore: snapshot canonical Component metadata [component-snapshot]"
          git push origin HEAD:test/component-canonical-clients
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
