name: TypeScript Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/kindrobots

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build social publishing removal
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/remove-social-publishing'
        run: node scripts/build-social-removal-artifact.mjs

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Regenerate component manifest
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/remove-social-publishing'
        run: |
          npm run components:manifest
          rm -f public/wonderlab-components.json

      - name: Format social removal source changes
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/remove-social-publishing'
        run: >-
          npx prettier --write
          components/giftshop/giftshop-manager.vue
          docs/architecture/thin-resource-api-audit.md
          docs/notes/backend-sweep-2026-07-05.md
          server/api/reactions/index.post.ts
          server/utils/restriction.ts
          server/utils/userPurge.ts
          stores/feedPreferenceStore.ts
          stores/helpers/dashboardHelper.ts
          stores/reactionStore.ts

      - name: Package social removal output
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/remove-social-publishing'
        shell: bash
        run: |
          set -euo pipefail
          output=/tmp/social-removal-output
          rm -rf "$output"
          mkdir -p "$output"

          copy_path() {
            local file="$1"
            mkdir -p "$output/$(dirname "$file")"
            cp "$file" "$output/$file"
          }

          while IFS= read -r -d '' file; do
            copy_path "$file"
          done < <(git diff --name-only --diff-filter=ACMRT -z)

          while IFS= read -r -d '' file; do
            copy_path "$file"
          done < <(git ls-files --others --exclude-standard -z)

          git diff --name-only --diff-filter=D > "$output/deleted-files.txt"
          git diff --stat > "$output/diff-stat.txt"

      - name: Upload social removal output
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/remove-social-publishing'
        uses: actions/upload-artifact@v4
        with:
          name: social-removal-output
          retention-days: 3
          if-no-files-found: error
          path: /tmp/social-removal-output

      - name: Type check
        run: npm run test > /tmp/typecheck.log 2>&1

      - name: Commit verified social removal
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/remove-social-publishing'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "kind-robots-refactor"
          git config user.email "kind-robots-refactor@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m "refactor: remove abandoned social publishing [skip ci]"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          retention-days: 3
          if-no-files-found: warn
          path: /tmp/typecheck.log
