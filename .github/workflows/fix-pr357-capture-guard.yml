name: Fix PR 357 Capture Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: fix-pr357-capture-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: github.head_ref == 'agent/remove-code-compositions'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CYPRESS_INSTALL_BINARY: '0'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-code-compositions
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Exclude abandonware from active-source guard
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('utils/scripts/verifyCaptureGroupGuards.ts')
          source = path.read_text()
          old = "  'cypress',\n  'prisma/generated',"
          new = "  'cypress',\n  'abandonware',\n  'prisma/generated',"

          if old not in source:
              raise SystemExit('Expected capture-guard exclusion block not found')

          path.write_text(source.replace(old, new, 1))
          PY

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify capture-group guard
        shell: bash
        run: |
          git fetch origin main
          npm run test:capture-group-guards-selftest
          npm run test:capture-group-guards -- origin/main

      - name: Remove temporary workflow
        run: rm -f .github/workflows/fix-pr357-capture-guard.yml

      - name: Commit fix
        shell: bash
        run: |
          git add -A
          git diff --cached --check
          git commit -m "exclude abandonware from active-source capture checks"
          git push origin HEAD:agent/remove-code-compositions
