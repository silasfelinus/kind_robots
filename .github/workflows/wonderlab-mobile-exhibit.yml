name: WonderLab mobile exhibit layout

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/wonderlab-mobile-exhibit.yml
      - .github/scripts/apply-wonderlab-mobile-exhibit.py

permissions:
  contents: write

jobs:
  patch-mobile-layout:
    name: Patch mobile exhibit layout
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout responsive collection branch
        uses: actions/checkout@v4
        with:
          ref: feat/wonderlab-responsive-collection
          fetch-depth: 0

      - name: Patch mobile exhibit layout
        run: python .github/scripts/apply-wonderlab-mobile-exhibit.py

      - name: Validate diff
        run: git diff --check -- components/wonderlab/lab-interact.vue

      - name: Commit mobile exhibit layout
        run: |
          git config user.name "kind-robots-wonderlab-mobile"
          git config user.email "kind-robots-wonderlab-mobile@users.noreply.github.com"
          git add components/wonderlab/lab-interact.vue
          if git diff --cached --quiet; then
            echo "WonderLab mobile exhibit layout is already current."
            exit 0
          fi
          git commit -m "feat: prioritize exhibit on mobile [mobile-exhibit]"
          git push origin HEAD:feat/wonderlab-responsive-collection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
