name: Apply Legacy Dream Write Consumer Cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/kindrobots
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/remove-legacy-dream-write-consumers
          fetch-depth: 1
          show-progress: false

      - name: Apply strict write-consumer cleanup
        run: python utils/scripts/apply_legacy_dream_write_consumer_cleanup.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Vue and TypeScript
        run: npm run test

      - name: Run Contract Tests
        run: npm run test:art-request-yaml

      - name: Commit validated write-consumer cleanup
        run: |
          git config user.name "kind-robots-agent"
          git config user.email "actions@users.noreply.github.com"
          git add components/dreams/dream-brainstorm.vue \
            server/api/sheets/batch.post.ts
          git commit -m "Remove legacy Dream write consumers"
          git push origin HEAD:agent/remove-legacy-dream-write-consumers
